spring.application.name=fixcart
server.port=${PORT:8080}

spring.datasource.url=${FIXCART_DATABASE_URL:jdbc:postgresql://localhost:5432/fixcart}
spring.datasource.username=${FIXCART_DATABASE_USERNAME:postgres}
spring.datasource.password=${FIXCART_DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.health.mail.enabled=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

info.app.name=fixcart
info.app.description=fixcart service marketplace backend
info.app.version=1.0.0

fixcart.cors.allowed-origins=${FIXCART_CORS_ALLOWED_ORIGINS:http://localhost:5173}
fixcart.otp.expiration-minutes=${FIXCART_OTP_EXPIRATION_MINUTES:5}
fixcart.otp.max-attempts=${FIXCART_OTP_MAX_ATTEMPTS:5}
fixcart.otp.expose-in-response=${FIXCART_OTP_EXPOSE_IN_RESPONSE:true}
fixcart.admin.bootstrap.enabled=${FIXCART_ADMIN_BOOTSTRAP_ENABLED:false}
fixcart.admin.bootstrap.email=${FIXCART_ADMIN_BOOTSTRAP_EMAIL:admin@fixcart.com}
fixcart.admin.bootstrap.password=${FIXCART_ADMIN_BOOTSTRAP_PASSWORD:admin123}
fixcart.admin.bootstrap.phone=${FIXCART_ADMIN_BOOTSTRAP_PHONE:9000000000}
fixcart.admin.bootstrap.full-name=${FIXCART_ADMIN_BOOTSTRAP_FULL_NAME:Fixcart Admin}
fixcart.demo.bootstrap.enabled=${FIXCART_DEMO_BOOTSTRAP_ENABLED:true}
fixcart.demo.bootstrap.password=${FIXCART_DEMO_BOOTSTRAP_PASSWORD:demo123}
fixcart.sms.provider=${FIXCART_SMS_PROVIDER:MOCK}
fixcart.sms.twilio.account-sid=${FIXCART_TWILIO_ACCOUNT_SID:}
fixcart.sms.twilio.auth-token=${FIXCART_TWILIO_AUTH_TOKEN:}
fixcart.sms.twilio.from-number=${FIXCART_TWILIO_FROM_NUMBER:}
fixcart.sms.fast2sms.api-key=${FIXCART_FAST2SMS_API_KEY:}
fixcart.sms.fast2sms.route=${FIXCART_FAST2SMS_ROUTE:dlt}
fixcart.sms.fast2sms.sender-id=${FIXCART_FAST2SMS_SENDER_ID:FIXCRT}
fixcart.email.provider=${FIXCART_EMAIL_PROVIDER:GMAIL_SMTP}
fixcart.email.from-address=${FIXCART_EMAIL_FROM_ADDRESS:}
fixcart.email.from-name=${FIXCART_EMAIL_FROM_NAME:fixcart}
spring.mail.host=${FIXCART_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${FIXCART_MAIL_PORT:587}
spring.mail.username=${FIXCART_MAIL_USERNAME:}
spring.mail.password=${FIXCART_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
fixcart.payment.razorpay.key-id=${FIXCART_RAZORPAY_KEY_ID:}
fixcart.payment.razorpay.key-secret=${FIXCART_RAZORPAY_KEY_SECRET:}
fixcart.payment.razorpay.webhook-secret=${FIXCART_RAZORPAY_WEBHOOK_SECRET:}
fixcart.payment.stripe.secret-key=${FIXCART_STRIPE_SECRET_KEY:}
fixcart.payment.stripe.webhook-secret=${FIXCART_STRIPE_WEBHOOK_SECRET:}
fixcart.geocoding.provider=${FIXCART_GEOCODING_PROVIDER:AUTO}
fixcart.geocoding.nominatim.base-url=${FIXCART_GEOCODING_NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
fixcart.geocoding.user-agent=${FIXCART_GEOCODING_USER_AGENT:fixcart/1.0}
fixcart.jwt.secret=${FIXCART_JWT_SECRET:dGhpc0lzQVN1cGVyU2VjdXJlRml4Y2FydEtleUZvckpXVDIwMjZTZWN1cmVk}
fixcart.jwt.expiration-millis=${FIXCART_JWT_EXPIRATION_MILLIS:86400000}
fixcart.booking.assignment-radius-km=${FIXCART_ASSIGNMENT_RADIUS_KM:20}
fixcart.booking.base-price=${FIXCART_BOOKING_BASE_PRICE:249}
fixcart.booking.distance-price-per-km=${FIXCART_BOOKING_DISTANCE_PRICE_PER_KM:12}
fixcart.route.road-factor=${FIXCART_ROUTE_ROAD_FACTOR:1.18}
fixcart.voice.memory-minutes=${FIXCART_VOICE_MEMORY_MINUTES:20}
